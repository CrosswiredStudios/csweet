services:
  # ---------------------------------------------------------
  # Public web entry point (Blazor WASM served by nginx)
  # ---------------------------------------------------------
  csweet-app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      csweet-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------
  # Database migrations and first-run seed data
  # ---------------------------------------------------------
  csweet-migrator:
    build:
      context: .
      dockerfile: docker/migrator.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Production}
      ConnectionStrings__Postgres: ${CSWEET_CONNECTIONSTRINGS__POSTGRES:-Host=postgres;Port=5432;Database=csweet;Username=csweet;Password=change-me-in-production}

  # ---------------------------------------------------------
  # API and application services
  # ---------------------------------------------------------
  csweet-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      csweet-migrator:
        condition: service_completed_successfully
      csweet-agenthost:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Production}
      ConnectionStrings__Postgres: ${CSWEET_CONNECTIONSTRINGS__POSTGRES:-Host=postgres;Port=5432;Database=csweet;Username=csweet;Password=change-me-in-production}
      CSWEET_SETUP__ALLOW_FIRST_RUN: ${CSWEET_SETUP__ALLOW_FIRST_RUN:-true}
      CSweet__Smtp__Host: ${CSWEET_SMTP__HOST:-}
      CSweet__Smtp__Port: ${CSWEET_SMTP__PORT:-587}
      CSweet__Smtp__EnableSsl: ${CSWEET_SMTP__ENABLESSL:-true}
      CSweet__Smtp__UserName: ${CSWEET_SMTP__USERNAME:-}
      CSweet__Smtp__Password: ${CSWEET_SMTP__PASSWORD:-}
      CSweet__Smtp__FromAddress: ${CSWEET_SMTP__FROMADDRESS:-}
      CSweet__Smtp__FromName: ${CSWEET_SMTP__FROMNAME:-C-Sweet}
      CSweet__Smtp__PublicAppUrl: ${CSWEET_SMTP__PUBLICAPPURL:-http://localhost:8080}
      CSWEET_LLM__DEFAULT_PROVIDER_TYPE: ${CSWEET_LLM__DEFAULT_PROVIDER_TYPE:-LMStudio}
      CSWEET_LLM__DEFAULT_BASE_URL: ${CSWEET_LLM__DEFAULT_BASE_URL:-http://host.docker.internal:1234/v1}
      CSWEET_LLM__DEFAULT_API_KEY: ${CSWEET_LLM__DEFAULT_API_KEY:-lm-studio}
      CSWEET_AGENT_PACKAGE_CACHE: /var/lib/csweet/agents/packages
      CSweet__ApiGateway__BrokerEndpoint: http://csweet-agenthost:8080
      CSweet__Secrets__FilePath: /state/provider-secrets.json
    volumes:
      - csweet-agent-packages:/var/lib/csweet/agents/packages:ro
      - csweet-provider-secrets:/state
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------
  # Local worker runtime
  # ---------------------------------------------------------
  csweet-worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      csweet-migrator:
        condition: service_completed_successfully
      csweet-api:
        condition: service_healthy
      csweet-agenthost:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Production}
      ConnectionStrings__Postgres: ${CSWEET_CONNECTIONSTRINGS__POSTGRES:-Host=postgres;Port=5432;Database=csweet;Username=csweet;Password=change-me-in-production}
      CSWEET_AGENT_SOURCE_ROOT: /var/lib/csweet/agents/sources
      CSWEET_AGENT_PACKAGE_CACHE: /var/lib/csweet/agents/packages
      CSWEET_AGENT_SOURCE_VOLUME: csweet-agent-sources
      CSWEET_AGENT_PACKAGE_VOLUME: csweet-agent-packages
      CSweet__AgentRuntime__BrokerEndpoint: http://csweet-agenthost:8080
      CSweet__AgentRuntime__DockerNetworkName: csweet-runtime
      CSweet__AgentRuntime__CleanupContainersOnStartup: ${CSWEET_AGENT_RUNTIME_CLEANUP_ON_STARTUP:-true}
      CSweet__AgentRuntime__BrokerWatchdogEnabled: ${CSWEET_AGENT_RUNTIME_BROKER_WATCHDOG_ENABLED:-true}
      CSweet__AgentRuntime__BrokerWatchdogStartupGraceSeconds: ${CSWEET_AGENT_RUNTIME_BROKER_WATCHDOG_STARTUP_GRACE_SECONDS:-30}
      CSweet__AgentRuntime__BrokerWatchdogIntervalSeconds: ${CSWEET_AGENT_RUNTIME_BROKER_WATCHDOG_INTERVAL_SECONDS:-10}
      CSweet__AgentRuntime__BrokerDisconnectShutdownSeconds: ${CSWEET_AGENT_RUNTIME_BROKER_DISCONNECT_SHUTDOWN_SECONDS:-120}
    group_add:
      - "${DOCKER_GID:-0}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - csweet-agent-sources:/var/lib/csweet/agents/sources
      - csweet-agent-packages:/var/lib/csweet/agents/packages

  csweet-agenthost:
    container_name: agenthost
    build:
      context: ..
      dockerfile: csweet/docker/agenthost.Dockerfile
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      csweet-migrator:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Production}
      ConnectionStrings__Postgres: ${CSWEET_CONNECTIONSTRINGS__POSTGRES:-Host=postgres;Port=5432;Database=csweet;Username=csweet;Password=change-me-in-production}
      CSweet__Secrets__FilePath: /state/provider-secrets.json
    volumes:
      - csweet-provider-secrets:/state

  # ---------------------------------------------------------
  # Database (PostgreSQL)
  # ---------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-csweet}
      POSTGRES_USER: ${POSTGRES_USER:-csweet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - csweet-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-csweet} -d ${POSTGRES_DB:-csweet}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  csweet-postgres:
    driver: local
  csweet-agent-sources:
    name: csweet-agent-sources
    driver: local
  csweet-agent-packages:
    name: csweet-agent-packages
    driver: local
  csweet-provider-secrets:
    name: csweet-provider-secrets
    driver: local

networks:
  default:
    name: csweet-runtime
