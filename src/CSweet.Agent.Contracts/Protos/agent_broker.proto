syntax = "proto3";

package csweet.agent.v1;

option csharp_namespace = "CSweet.Agent.Contracts.Grpc";

import "google/protobuf/timestamp.proto";

service AgentBroker {
  rpc Connect(stream AgentToBrokerMessage) returns (stream BrokerToAgentMessage);
}

message AgentToBrokerMessage {
  string message_id = 1;
  string correlation_id = 2;

  oneof payload {
    RegisterAgent register = 10;
    PublishEvent publish_event = 11;
    RequestCapability capability_request = 12;
    CapabilityResult capability_result = 13;
    Acknowledge acknowledge = 14;
    Heartbeat heartbeat = 15;
  }
}

message BrokerToAgentMessage {
  string message_id = 1;
  string correlation_id = 2;

  oneof payload {
    RegistrationResult registration = 10;
    DeliveredEvent event = 11;
    CapabilityRequest capability_request = 12;
    CapabilityResult capability_result = 13;
    BrokerError error = 14;
    ShutdownRequest shutdown = 15;
  }
}

message RegisterAgent {
  string agent_id = 1;
  string agent_version = 2;
  string installation_id = 3;
  string business_id = 4;
  repeated string declared_capabilities = 5;
  repeated string requested_subscriptions = 6;
  repeated string requested_publications = 7;
}

message RegistrationResult {
  bool accepted = 1;
  string session_id = 2;
  string rejection_reason = 3;
  repeated string granted_capabilities = 4;
  repeated string granted_subscriptions = 5;
  repeated string granted_publications = 6;
}

message PublishEvent {
  string event_type = 1;
  string schema_version = 2;
  string subject = 3;
  string content_type = 4;
  bytes payload = 5;
}

message DeliveredEvent {
  string event_id = 1;
  string source_agent_id = 2;
  string event_type = 3;
  string schema_version = 4;
  string subject = 5;
  string content_type = 6;
  bytes payload = 7;
  google.protobuf.Timestamp occurred_at = 8;
}

message RequestCapability {
  string request_id = 1;
  string capability = 2;
  string content_type = 3;
  bytes payload = 4;
}

message CapabilityRequest {
  string request_id = 1;
  string requesting_agent_id = 2;
  string capability = 3;
  string content_type = 4;
  bytes payload = 5;
}

message CapabilityResult {
  string request_id = 1;
  bool succeeded = 2;
  string content_type = 3;
  bytes payload = 4;
  string error = 5;
}

message Acknowledge {
  string message_id = 1;
}

message Heartbeat {
  google.protobuf.Timestamp sent_at = 1;
}

message BrokerError {
  string code = 1;
  string message = 2;
}

message ShutdownRequest {
  string reason = 1;
}
